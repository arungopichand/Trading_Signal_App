name: Deploy Production (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production-main
  cancel-in-progress: false

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: signal-ui/package-lock.json

      - name: Frontend install/lint/build
        working-directory: signal-ui
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Backend restore/build/test
        run: |
          dotnet restore Trading_Signal_App.sln
          dotnet build Trading_Signal_App.sln --configuration Release --no-restore
          dotnet test Trading_Signal_App.sln --configuration Release --no-build --verbosity normal

  deploy-frontend-production:
    runs-on: ubuntu-latest
    needs: quality-check
    if: secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != ''

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull production config
        working-directory: signal-ui
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build production artifact
        working-directory: signal-ui
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy production
        working-directory: signal-ui
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  deploy-backend-production:
    runs-on: ubuntu-latest
    needs: quality-check
    if: secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL != ''

    steps:
      - name: Trigger Render production deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL }}"
