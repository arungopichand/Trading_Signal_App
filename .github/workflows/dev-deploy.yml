name: Deploy Development

on:
  workflow_dispatch:

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (Dev)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Frontend install + lint + build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Backend restore + build + test
        run: |
          dotnet restore Trading_Signal_App.sln
          dotnet build Trading_Signal_App.sln -c Release --no-restore
          dotnet test backend/SignalFeed.Tests/SignalFeed.Tests.csproj -c Release --no-build

  deploy-frontend:
    name: Deploy Frontend (Vercel Dev)
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Deploy to Vercel (Preview/Dev)
        run: npx vercel --cwd frontend --yes --token "$VERCEL_TOKEN"

  deploy-backend:
    name: Deploy Backend (Render Dev)
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      RENDER_DEV_DEPLOY_HOOK: ${{ secrets.RENDER_DEV_DEPLOY_HOOK }}
    steps:
      - name: Trigger Render Dev Deploy Hook
        run: |
          echo "Triggering Render dev hook (POST, fallback GET)..."
          if curl --fail --show-error --silent -X POST "$RENDER_DEV_DEPLOY_HOOK" > /dev/null; then
            echo "Render dev hook accepted POST."
            exit 0
          fi

          echo "POST rejected; retrying with GET."
          curl --fail --show-error --silent "$RENDER_DEV_DEPLOY_HOOK" > /dev/null
          echo "Render dev hook accepted GET."

  verify-health:
    name: Verify Backend Health (Dev)
    runs-on: ubuntu-latest
    needs:
      - deploy-frontend
      - deploy-backend
    env:
      BACKEND_DEV_HEALTHCHECK_URL: ${{ secrets.BACKEND_DEV_HEALTHCHECK_URL }}
    steps:
      - name: Wait for rollout
        run: sleep 30

      - name: Health check must return 200
        run: |
          curl --fail --show-error --silent --retry 6 --retry-delay 10 "$BACKEND_DEV_HEALTHCHECK_URL/health"
