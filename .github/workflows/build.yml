name: Build Check

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build Backend
        run: dotnet build backend/SignalFeed.Api/SignalFeed.Api.csproj --configuration Release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: signal-ui/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: signal-ui

      - name: Build Frontend
        run: npm run build
        working-directory: signal-ui
