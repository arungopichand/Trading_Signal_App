name: Build and Test

on:
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Trading_Signal_App.sln

      - name: Build
        run: dotnet build Trading_Signal_App.sln -c Release --no-restore

      - name: Test
        run: dotnet test backend/SignalFeed.Tests/SignalFeed.Tests.csproj -c Release --no-build
