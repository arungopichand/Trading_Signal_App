name: PR Quality Gate (dev)

on:
  pull_request:
    branches:
      - dev

concurrency:
  group: pr-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: signal-ui/package-lock.json

      - name: Frontend install
        working-directory: signal-ui
        run: npm ci

      - name: Frontend lint
        working-directory: signal-ui
        run: npm run lint

      - name: Frontend build
        working-directory: signal-ui
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Backend restore
        run: dotnet restore Trading_Signal_App.sln

      - name: Backend build
        run: dotnet build Trading_Signal_App.sln --configuration Release --no-restore

      - name: Backend tests
        run: dotnet test Trading_Signal_App.sln --configuration Release --no-build --verbosity normal
