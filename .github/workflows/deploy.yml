name: Deploy Production

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/deploy.yml'
      - 'Trading_Signal_App.sln'
      - 'render.yaml'
# Trigger note: workflow path filter intentionally keeps prod deploy scoped to runtime-impacting changes. # deploy-trigger 2026-04-13

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Frontend install + lint + build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Backend restore + build + test
        run: |
          dotnet restore Trading_Signal_App.sln
          dotnet build Trading_Signal_App.sln -c Release --no-restore
          dotnet test backend/SignalFeed.Tests/SignalFeed.Tests.csproj -c Release --no-build

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID || secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate Vercel frontend project secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing VERCEL_TOKEN secret."
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "::error::Missing VERCEL_ORG_ID secret."
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Missing VERCEL_FRONTEND_PROJECT_ID (or legacy VERCEL_PROJECT_ID) secret."
            exit 1
          fi

      - name: Pull Vercel project settings (production)
        run: npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN" --cwd frontend

      - name: Build frontend artifacts with Vercel
        run: npx vercel build --prod --token "$VERCEL_TOKEN" --cwd frontend

      - name: Deploy prebuilt artifacts to Vercel
        run: |
          for i in 1 2 3; do
            echo "Vercel deploy attempt $i/3"
            if npx vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN" --cwd frontend; then
              exit 0
            fi
            if [ "$i" -lt 3 ]; then
              echo "Deploy attempt failed; retrying in 10s..."
              sleep 10
            fi
          done
          echo "::error::Vercel deploy failed after 3 attempts."
          exit 1

  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
    steps:
      - name: Validate Render deploy hook secret
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::error::Missing RENDER_DEPLOY_HOOK secret."
            exit 1
          fi

      - name: Trigger Render deploy hook
        run: |
          echo "Triggering Render deploy hook (POST, fallback GET)..."
          if curl --fail --show-error --silent -X POST "$RENDER_DEPLOY_HOOK" > /dev/null; then
            echo "Render deploy hook accepted POST."
            exit 0
          fi

          echo "POST rejected; retrying with GET."
          curl --fail --show-error --silent "$RENDER_DEPLOY_HOOK" > /dev/null
          echo "Render deploy hook accepted GET."

  verify-health:
    name: Verify Backend Health
    runs-on: ubuntu-latest
    needs:
      - deploy-frontend
      - deploy-backend
      - build-and-test
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
    steps:
      - name: Validate health check URL secret
        run: |
          if [ -z "$BACKEND_HEALTHCHECK_URL" ]; then
            echo "::error::Missing BACKEND_HEALTHCHECK_URL secret."
            exit 1
          fi
          case "$BACKEND_HEALTHCHECK_URL" in
            http://*|https://*) ;;
            *)
              echo "::error::BACKEND_HEALTHCHECK_URL must be an absolute http(s) URL."
              exit 1
              ;;
          esac
          echo "HEALTH_URL=${BACKEND_HEALTHCHECK_URL%/}/health" >> "$GITHUB_ENV"

      - name: Retry backend health + feed checks
        run: |
          BASE_URL="${BACKEND_HEALTHCHECK_URL%/}"
          FEED_URL="${BASE_URL}/api/feed?limit=1"
          STREAM_URL="${BASE_URL}/health/stream"

          echo "Polling backend readiness (max 10 attempts, 10s delay)..."
          for i in {1..10}; do
            HEALTH_OK=0
            FEED_OK=0
            STREAM_OK=0

            if curl --fail --show-error --silent "$HEALTH_URL" > /dev/null; then
              HEALTH_OK=1
            fi

            if curl --fail --show-error --silent "$FEED_URL" > /dev/null; then
              FEED_OK=1
            fi

            if curl --fail --show-error --silent "$STREAM_URL" > /dev/null; then
              STREAM_OK=1
            else
              echo "Optional stream health check failed on attempt $i/10; continuing."
            fi

            if [ "$HEALTH_OK" -eq 1 ] && [ "$FEED_OK" -eq 1 ]; then
              echo "Backend checks passed (health + feed)."
              if [ "$STREAM_OK" -eq 1 ]; then
                echo "Stream health endpoint is healthy."
              fi
              exit 0
            fi

            echo "Attempt $i/10 failed; retrying in 10s..."
            sleep 10
          done
          echo "::error::Backend did not pass health/feed checks in time."
          exit 1
