name: Deploy Staging (dev)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-staging-dev
  cancel-in-progress: true

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: signal-ui/package-lock.json

      - name: Frontend install/lint/build
        working-directory: signal-ui
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Backend restore/build/test
        run: |
          dotnet restore Trading_Signal_App.sln
          dotnet build Trading_Signal_App.sln --configuration Release --no-restore
          dotnet test Trading_Signal_App.sln --configuration Release --no-build --verbosity normal

  deploy-frontend-staging:
    runs-on: ubuntu-latest
    needs: quality-check

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Skip if Vercel secrets missing
        id: vercel-secrets
        shell: bash
        run: |
          if [[ -z "${VERCEL_TOKEN}" || -z "${VERCEL_ORG_ID}" || -z "${VERCEL_PROJECT_ID}" ]]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Skipping frontend staging deploy: required Vercel secrets are not set."
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Install Vercel CLI
        if: steps.vercel-secrets.outputs.available == 'true'
        run: npm install --global vercel@latest

      - name: Pull preview config
        if: steps.vercel-secrets.outputs.available == 'true'
        working-directory: signal-ui
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build preview artifact
        if: steps.vercel-secrets.outputs.available == 'true'
        working-directory: signal-ui
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy preview
        if: steps.vercel-secrets.outputs.available == 'true'
        working-directory: signal-ui
        run: vercel deploy --prebuilt --token=$VERCEL_TOKEN

  deploy-backend-staging:
    runs-on: ubuntu-latest
    needs: quality-check
    env:
      RENDER_STAGING_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger Render staging deploy
        shell: bash
        run: |
          if [[ -z "${RENDER_STAGING_DEPLOY_HOOK_URL}" ]]; then
            echo "Skipping backend staging deploy: RENDER_STAGING_DEPLOY_HOOK_URL is not set."
            exit 0
          fi
          curl -fsS -X POST "${RENDER_STAGING_DEPLOY_HOOK_URL}"
