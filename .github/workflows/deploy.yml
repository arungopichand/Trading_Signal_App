name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Frontend install + lint + build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Backend restore + build + test
        run: |
          dotnet restore Trading_Signal_App.sln
          dotnet build Trading_Signal_App.sln -c Release --no-restore
          dotnet test backend/SignalFeed.Tests/SignalFeed.Tests.csproj -c Release --no-build

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"

  verify-health:
    name: Verify Backend Health
    runs-on: ubuntu-latest
    needs:
      - deploy-frontend
      - build-and-test
    env:
      BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
    steps:
      - name: Validate health check URL secret
        run: |
          if [ -z "$BACKEND_HEALTHCHECK_URL" ]; then
            echo "::error::Missing BACKEND_HEALTHCHECK_URL secret."
            exit 1
          fi
          case "$BACKEND_HEALTHCHECK_URL" in
            http://*|https://*) ;;
            *)
              echo "::error::BACKEND_HEALTHCHECK_URL must be an absolute http(s) URL."
              exit 1
              ;;
          esac
          echo "HEALTH_URL=${BACKEND_HEALTHCHECK_URL%/}/health" >> "$GITHUB_ENV"

      - name: Wait for Render auto-deploy rollout
        run: sleep 60

      - name: Health check must return 200
        run: |
          curl --fail --show-error --silent --retry 6 --retry-delay 10 "$HEALTH_URL"
