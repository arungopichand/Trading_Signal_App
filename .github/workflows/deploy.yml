name: CI/CD

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: signal-ui/package-lock.json

      - name: Install frontend deps
        working-directory: signal-ui
        run: |
          npm ci
          npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build backend
        working-directory: backend/SignalFeed.Api
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

  deploy-frontend-preview:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/dev' && secrets.VERCEL_TOKEN != ''

    env:
      VERCEL_FORCE_NO_BUILD_CACHE: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env/config (preview)
        working-directory: signal-ui
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview Vercel artifact
        working-directory: signal-ui
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview frontend to Vercel
        working-directory: signal-ui
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

  deploy-frontend-vercel:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && secrets.VERCEL_TOKEN != ''

    env:
      VERCEL_FORCE_NO_BUILD_CACHE: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env/config
        working-directory: signal-ui
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel artifact
        working-directory: signal-ui
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy frontend to Vercel
        working-directory: signal-ui
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-backend-render:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && secrets.RENDER_DEPLOY_HOOK_URL != ''

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deploy triggered. Waiting before health checks..."
          sleep 45

      - name: Verify backend health and self-heal
        run: |
          set -euo pipefail

          HEALTH_URL="${{ secrets.RENDER_HEALTHCHECK_URL }}"
          if [ -z "$HEALTH_URL" ]; then
            HEALTH_URL="https://trading-backend-cq8w.onrender.com/health"
          fi

          echo "Checking health at: $HEALTH_URL"
          healthy=false
          for attempt in 1 2 3 4 5 6; do
            if curl -fsS "$HEALTH_URL" >/dev/null; then
              healthy=true
              echo "Backend health check passed on attempt $attempt."
              break
            fi
            echo "Health check attempt $attempt failed; retrying in 20s..."
            sleep 20
          done

          if [ "$healthy" = false ]; then
            echo "Health check failed after initial deploy. Triggering self-heal redeploy hook."
            curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            sleep 45

            for attempt in 1 2 3 4 5 6; do
              if curl -fsS "$HEALTH_URL" >/dev/null; then
                echo "Backend health check passed after self-heal on attempt $attempt."
                exit 0
              fi
              echo "Post-redeploy health attempt $attempt failed; waiting 20s..."
              sleep 20
            done

            echo "Backend still unhealthy after self-heal redeploy."
            exit 1
          fi
