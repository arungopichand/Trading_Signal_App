name: Deploy Trading App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend dependencies
        run: dotnet restore backend/SignalFeed.Api/SignalFeed.Api.csproj

      - name: Build backend
        run: dotnet build backend/SignalFeed.Api/SignalFeed.Api.csproj --configuration Release --no-restore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: signal-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: signal-ui

      - name: Build frontend
        run: npm run build
        working-directory: signal-ui

      - name: Install Vercel CLI
        run: npm install --global vercel@50.28.0

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: signal-ui

      - name: Build Vercel artifact
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: signal-ui

      - name: Deploy frontend to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: signal-ui

      - name: Trigger backend deploy on Render
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
