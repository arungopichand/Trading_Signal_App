name: Deploy Trading App

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend dependencies
        run: dotnet restore backend/SignalFeed.Api/SignalFeed.Api.csproj

      - name: Build backend
        run: dotnet build backend/SignalFeed.Api/SignalFeed.Api.csproj --configuration Release --no-restore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: signal-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: signal-ui

      - name: Build frontend
        run: npm run build
        working-directory: signal-ui

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@50.28.0

      - name: Link Vercel project
        run: vercel link --yes --project trading-signal-ui --scope arungopichands-projects --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: signal-ui

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: signal-ui

      - name: Build Vercel artifact
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: signal-ui

      - name: Deploy frontend to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: signal-ui
