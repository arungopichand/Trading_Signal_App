services:
  - type: web
    name: trading-backend-staging
    runtime: dotnet
    plan: free
    region: ohio
    branch: dev
    rootDir: backend/SignalFeed.Api
    buildCommand: dotnet publish -c Release -o out
    startCommand: dotnet out/SignalFeed.Api.dll
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: FINNHUB__APIKEY
        sync: false
      - key: POLYGON__APIKEY
        sync: false
      - key: NEWSAPI__APIKEY
        sync: false
      - key: FMP__APIKEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ENABLE_REALTIME_STREAM
        value: "false"
      - key: ENABLE_UNIVERSE_REFRESH
        value: "true"
      - key: ENABLE_SIGNAL_SCANNER
        value: "true"

  - type: web
    name: trading-backend-prod
    runtime: dotnet
    plan: free
    region: ohio
    branch: main
    rootDir: backend/SignalFeed.Api
    buildCommand: dotnet publish -c Release -o out
    startCommand: dotnet out/SignalFeed.Api.dll
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: FINNHUB__APIKEY
        sync: false
      - key: POLYGON__APIKEY
        sync: false
      - key: NEWSAPI__APIKEY
        sync: false
      - key: FMP__APIKEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ENABLE_REALTIME_STREAM
        value: "false"
      - key: ENABLE_UNIVERSE_REFRESH
        value: "true"
      - key: ENABLE_SIGNAL_SCANNER
        value: "true"
