services:
  - type: web
    name: trading-backend
    runtime: dotnet
    plan: free
    region: ohio
    rootDir: backend/SignalFeed.Api
    buildCommand: dotnet restore && dotnet build --configuration Release --no-restore
    startCommand: dotnet run --urls=http://0.0.0.0:10000
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - backend/**
        - render.yaml
        - .github/workflows/deploy.yml
    envVars:
      - key: FINNHUB__APIKEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
